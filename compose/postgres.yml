services:

  # ============================================================================
  # PostgreSQL + TimescaleDB
  # Persists tickers, candles, strategies, signals, orders, exchanges/pairs.
  # engine/bin/http.rs runs sqlx migrations from ./engine/migrations on startup.
  # ============================================================================
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: postgres
    hostname: postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: "${POSTGRES_USER:-stream_coin}"
      # No default: refuse to start unless a real password is supplied (see .env.example).
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}"
      POSTGRES_DB: "${POSTGRES_DB:-stream_coin}"

    expose:
      - "5432"
    # Bound to loopback only — reachable by the host (local dev / migrations /
    # ignored PG integration tests) but never from the LAN or internet.
    ports:
      - "127.0.0.1:5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stream_coin} -d ${POSTGRES_DB:-stream_coin}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEMORY_LIMIT:-1G}
          cpus: "${POSTGRES_CPU_LIMIT:-1.0}"
        reservations:
          memory: ${POSTGRES_MEMORY_RESERVATION:-256M}
          cpus: "${POSTGRES_CPU_RESERVATION:-0.25}"

    networks:
      - stream-coin
