# ==============================================================================
# stream-coin — Master Compose File
#
# Usage:
#   docker compose up -d      # brings up postgres + redis + kafka + kafka-ui
#
# schema-registry / kafka-connect / rest-proxy / flink / nginx are all disabled below
# (unused infra — see "DISABLED SERVICES" comments). Re-enable as needed.
#
# Kafka connection for app containers:  kafka:9094  (DOCKER plaintext)
# Kafka connection from host (dev):     localhost:9092  (HOST plaintext)
# Redis connection for app containers:  redis://redis:6379
# Redis connection from host (dev):     redis://localhost:6379
# Postgres connection for app containers: postgresql://stream_coin:<pw>@postgres:5432/stream_coin
# Postgres connection from host (dev):     postgresql://stream_coin:<pw>@localhost:5432/stream_coin
#
# Setup (first time):
#   cp .env.example .env          # fill in passwords
#   docker compose up -d postgres   # then run engine — it applies migrations on startup
# ==============================================================================

name: stream-coin

include:
  - path: compose/postgres.yml
    project_directory: .
  - path: compose/redis.yml
    project_directory: .
  - path: compose/kafka.yml
    project_directory: .
  - path: compose/ui.yml
    project_directory: .
  # --- DISABLED SERVICES (uncomment the block below when needed) ---
  #
  # schema-registry + kafka-connect + rest-proxy: needed for Loop 4c (Protobuf schemas).
  # To enable: uncomment the three blocks below AND the matching volumes at the bottom.
  #
  # - path: compose/schema.yml
  #   project_directory: .
  # - path: compose/connect.yml
  #   project_directory: .
  # - path: compose/rest-proxy.yml
  #   project_directory: .
  #
  # flink: needed when candle aggregation moves out of engine (Loop 5+, ≥5 exchanges).
  # To enable: uncomment the block below AND flink-checkpoints volume at the bottom.
  #
  # - path: compose/flink.yml
  #   project_directory: .
  #
  # proxy (nginx): fronts kafka-ui (and schema-registry/kafka-connect/flink dashboards
  # when those are enabled too). nginx's depends_on names all of them — re-enable only
  # once every service it fronts is also enabled.
  #
  # - path: compose/proxy.yml
  #   project_directory: .

# ==============================================================================
# Network — single bridge network for all services
# ==============================================================================
networks:
  stream-coin:
    driver: bridge
    name: stream-coin

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  postgres-data:
    driver: local
    name: postgres-data

  redis-data:
    driver: local
    name: redis-data

  kafka-data:
    driver: local
    name: kafka-data

  # kafka-connect-data:   (uncomment with compose/connect.yml)
  #   driver: local
  #   name: kafka-connect-data
  # kafka-connect-plugins: (uncomment with compose/connect.yml)
  #   driver: local
  #   name: kafka-connect-plugins
  # flink-checkpoints:    (uncomment with compose/flink.yml)
  #   driver: local
  #   name: flink-checkpoints
