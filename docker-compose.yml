# ==============================================================================
# stream-coin — Master Compose File
#
# Usage:
#   Full stack:    docker compose up -d
#   Infra only:    docker compose up -d redis kafka schema-registry kafka-connect flink-jobmanager flink-taskmanager kafka-ui
#   Without proxy: docker compose up -d --scale nginx=0
#
# Kafka connection for app containers:  kafka:9094  (DOCKER plaintext)
# Kafka connection from host (dev):     localhost:9092  (HOST plaintext)
# Redis connection for app containers:  redis://redis:6379
# Redis connection from host (dev):     redis://localhost:6379
#
# Setup (first time):
#   cp .env.example .env          # fill in passwords and domain
#   mkdir -p cert nginx/auth
#   cp /path/to/fullchain.pem cert/
#   cp /path/to/privkey.pem cert/
#   htpasswd -c nginx/auth/.htpasswd <username>
#   docker compose up -d
# ==============================================================================

name: stream-coin

include:
  - path: compose/redis.yml
    project_directory: .
  - path: compose/kafka.yml
    project_directory: .
  - path: compose/schema.yml
    project_directory: .
  - path: compose/connect.yml
    project_directory: .
  - path: compose/rest-proxy.yml
    project_directory: .
  - path: compose/flink.yml
    project_directory: .
  - path: compose/ui.yml
    project_directory: .
  - path: compose/proxy.yml
    project_directory: .

# ==============================================================================
# Network — single bridge network for all services
# ==============================================================================
networks:
  stream-coin:
    driver: bridge
    name: stream-coin

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  redis-data:
    driver: local
    name: redis-data

  kafka-data:
    driver: local
    name: kafka-data

  kafka-connect-data:
    driver: local
    name: kafka-connect-data

  kafka-connect-plugins:
    driver: local
    name: kafka-connect-plugins

  flink-checkpoints:
    driver: local
    name: flink-checkpoints
